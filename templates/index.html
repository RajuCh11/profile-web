<!DOCTYPE html>
<html>
<head>

  <!-- AOS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"/>

<header>

    <a href="#dashboard">Dashboard</a>

<!-- HERO -->

<section id="skills">
